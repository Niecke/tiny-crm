services:
  db:
    image: docker.io/library/postgres:18
    environment:
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
      POSTGRES_DB: crm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U crm -d crm" ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
